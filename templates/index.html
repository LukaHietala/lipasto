<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="/static/styles.css">
    </head>
    <body>
        <ul>
        {{ range .Repos }}
            <li>
                <a href="{{ .Name }}">{{ .Name }}</a>
                <span>{{ .Description }}</span>
                <span> - Last updated {{ .LatestCommit.Author.When | humanizeTime }}</span>
            </li>
        {{ end }}
        </ul> 
    </body>
</html>
